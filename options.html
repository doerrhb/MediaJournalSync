<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Media Journal Sync Settings</title>
    <style>
        body {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f7;
            color: #333;
        }
        h1 {
            color: #222;
            border-bottom: 2px solid #0078d4;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .section {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .field {
            margin-bottom: 15px;
        }
        .field label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .field input:focus {
            border-color: #0078d4;
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,120,212,0.1);
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button#save {
            background-color: #0078d4;
            color: white;
        }
        button#save:hover {
            background-color: #005a9e;
        }
        button#reset {
            background-color: #f0f0f0;
            color: #333;
        }
        button#reset:hover {
            background-color: #e0e0e0;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            text-align: right;
            color: green;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Media Journal Sync Settings</h1>

    <div class="section">
        <h2>Custom Diary URLs</h2>
        <p>Enter the URLs for your specific diary/journal pages. These will be opened when you click "Open source pages?" in the extension menu.</p>
        
        <form id="urlForm">
            <div class="field">
                <label for="Letterboxd">Letterboxd (Diary)</label>
                <input type="url" id="Letterboxd" placeholder="https://letterboxd.com/USER/diary/">
            </div>
            <div class="field">
                <label for="Goodreads">Goodreads (Table View)</label>
                <input type="url" id="Goodreads" placeholder="https://www.goodreads.com/review/list/USER?view=table">
            </div>
            <div class="field">
                <label for="Backloggd">Backloggd (Journal)</label>
                <input type="url" id="Backloggd" placeholder="https://backloggd.com/u/USER/journal/">
            </div>
            <div class="field">
                <label for="BoardGameGeek">BoardGameGeek (Plays)</label>
                <input type="url" id="BoardGameGeek" placeholder="https://boardgamegeek.com/geekplay.php?userid=USER">
            </div>
            <div class="field">
                <label for="Serializd">Serializd (Diary)</label>
                <input type="url" id="Serializd" placeholder="https://www.serializd.com/user/USER/diary">
            </div>

            <div class="actions">
                <button type="button" id="reset">Reset to Defaults</button>
                <button type="submit" id="save">Save Settings</button>
            </div>
        </form>
        <div id="status">Settings saved!</div>
    </div>

    <script src="options.js"></script>
</body>
</html>
