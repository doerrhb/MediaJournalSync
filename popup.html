<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .header img {
            width: 24px;
            height: 24px;
            margin-right: 10px;
        }
        .header h1 {
            font-size: 16px;
            margin: 0;
            color: #222;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
            background-color: #0078d4;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:hover {
            background-color: #005a9e;
        }
        button.secondary {
            background-color: #e1e1e1;
            color: #333;
        }
        button.secondary:hover {
            background-color: #d1d1d1;
        }
        .footer {
            margin-top: 10px;
            text-align: center;
        }
        .footer a {
            color: #0078d4;
            text-decoration: none;
            font-size: 12px;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        #status {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="icon128.png" alt="icon">
        <h1>Media Journal Sync</h1>
    </div>

    <div id="status"></div>

    <button id="exportBtn">Export Current Page</button>
    <button id="openSourcesBtn" class="secondary">Open source pages?</button>
    <button id="debugBtn" class="secondary" style="font-size: 11px; margin-top: 5px;">Download Debug Logs</button>

    <div class="footer">
        <div style="font-size: 10px; color: #888; margin-bottom: 5px;">Files saved to your Downloads folder.</div>
        <a href="#" id="settingsLink">Settings</a>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
