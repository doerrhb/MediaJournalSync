<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { box-sizing: border-box; }

        body {
            width: 340px;
            padding: 12px 14px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f7;
            color: #222;
            margin: 0;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .header img { width: 22px; height: 22px; margin-right: 8px; }
        .header h1 { font-size: 15px; margin: 0; color: #111; flex: 1; }
        .badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 10px;
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            white-space: nowrap;
        }
        .badge.off {
            background: #fff3e0;
            color: #bf360c;
            border-color: #ffe0b2;
        }

        /* ── Buttons ── */
        button {
            width: 100%;
            padding: 9px 12px;
            margin-bottom: 7px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        button.primary   { background: #0078d4; color: #fff; }
        button.primary:hover { background: #005fa3; }
        button.success   { background: #107c10; color: #fff; }
        button.success:hover { background: #0a5e0a; }
        button.secondary { background: #e2e2e2; color: #333; }
        button.secondary:hover { background: #d0d0d0; }
        button.danger    { background: #c50f1f; color: #fff; }
        button.danger:hover { background: #a00e1a; }
        button:disabled  { opacity: 0.45; cursor: default; }
        button.small     { font-size: 11px; padding: 6px 10px; }

        /* ── Status bar ── */
        #status {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: none;
            text-align: center;
            background: #e9e9e9;
        }

        /* ── Section headings ── */
        .section-heading {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #666;
            margin: 10px 0 5px;
        }

        /* ── Fields ── */
        .field { margin-bottom: 6px; }
        .field label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #555;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .field input {
            width: 100%;
            padding: 5px 7px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
            background: #fff;
            color: #111;
        }
        .field input:focus { border-color: #0078d4; outline: none; }
        .field input.ok      { border-color: #81c784; }
        .field input.missing { border-color: #ffb74d; background: #fff9f0; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

        /* ── Sheets preview ── */
        .sheets-preview {
            background: #fff;
            border: 1px solid #b2dfdb;
            border-radius: 6px;
            overflow: hidden;
            font-size: 11px;
        }
        .sp-header {
            background: #e0f2f1;
            padding: 4px 9px;
            font-size: 10px;
            font-weight: 700;
            color: #00695c;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sp-header .not-cfg {
            margin-left: auto;
            color: #e65100;
            font-size: 10px;
            display: none;
        }
        .sp-labels, .sp-values {
            display: flex;
            border-top: 1px solid #e0f2f1;
        }
        .sp-cell {
            flex: 1;
            padding: 4px 7px;
            border-right: 1px solid #e0f2f1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sp-cell:last-child { border-right: none; }
        .sp-labels .sp-cell { color: #888; font-weight: 700; font-size: 10px; background: #fafafa; }
        .sp-values .sp-cell { color: #111; }
        .sp-values .sp-cell.empty { color: #e65100; font-style: italic; }

        /* ── Image path ── */
        .img-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 7px 9px;
        }
        .img-box .path-lbl {
            font-size: 10px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 3px;
        }
        .img-box input {
            width: 100%;
            padding: 4px 7px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Consolas', 'Courier New', monospace;
            color: #0078d4;
        }
        .img-box input:focus { border-color: #0078d4; outline: none; }
        .img-box .src-url {
            margin-top: 4px;
            font-size: 10px;
            color: #aaa;
            word-break: break-all;
            font-family: monospace;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 8px;
            text-align: center;
            font-size: 11px;
            color: #aaa;
        }
        .footer a { color: #0078d4; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        hr { border: none; border-top: 1px solid #e0e0e0; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- ── Header ── -->
    <div class="header">
        <img src="icon128.png" alt="">
        <h1>Media Journal Sync</h1>
        <span class="badge off" id="sheetsBadge">Sheets ✗</span>
    </div>

    <div id="status"></div>

    <!-- ════════════════════════════════════════
         Main Menu
    ════════════════════════════════════════ -->
    <div id="mainMenu">
        <button class="primary" id="exportBtn">▶ Scrape &amp; Review Entry</button>
        <button class="secondary" id="openSourcesBtn">Open All Source Pages</button>
        <button class="secondary small" id="exportAllBtn">⬇ Download All CSVs</button>
        <button class="secondary small" id="debugBtn">🐛 Download Debug Logs</button>
    </div>

    <!-- ════════════════════════════════════════
         Review / Preflight Panel
    ════════════════════════════════════════ -->
    <div id="reviewSection" style="display:none;">

        <!-- Title bar -->
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:9px;">
            <span style="font-weight:700; font-size:14px;">Review Entry</span>
            <span id="siteLabel" class="badge" style="font-size:11px; background:#ede7f6; color:#4527a0; border-color:#ce93d8;"></span>
        </div>

        <!-- ── Poster + fields ── -->
        <div style="display:flex; gap:10px; margin-bottom:6px;">

            <!-- Poster thumbnail -->
            <div style="flex-shrink:0; width:80px;">
                <img id="reviewPoster" src=""
                     style="width:80px; height:120px; object-fit:cover; border-radius:5px;
                            border:2px solid #ccc; background:#ddd; display:none;">
                <div id="posterMissing"
                     style="width:80px; height:120px; border-radius:5px; border:2px dashed #bbb;
                            background:#eee; display:flex; flex-direction:column;
                            align-items:center; justify-content:center; gap:4px;
                            font-size:10px; color:#999; text-align:center; padding:6px;">
                    <span style="font-size:22px;">🖼</span>
                    No image found
                </div>
            </div>

            <!-- Editable fields -->
            <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                <div class="field">
                    <label>Title</label>
                    <input type="text" id="reviewTitle">
                </div>
                <div class="two-col">
                    <div class="field">
                        <label id="dateLabelTxt">Date Watched</label>
                        <input type="text" id="reviewDate" placeholder="M/D/YYYY">
                    </div>
                    <div class="field">
                        <label>Rating</label>
                        <input type="text" id="reviewRating" placeholder="e.g. 4.5">
                    </div>
                </div>
                <div class="field" id="yearField">
                    <label>Release Year</label>
                    <input type="text" id="reviewYear" placeholder="YYYY">
                </div>
                <div class="field" id="platformField" style="display:none;">
                    <label>Platform</label>
                    <input type="text" id="reviewPlatform" placeholder="e.g. PC">
                </div>
            </div>
        </div>

        <!-- ── Google Sheets row preview ── -->
        <div class="section-heading">📊 Google Sheets — Row That Will Be Added</div>
        <div class="sheets-preview">
            <div class="sp-header">
                <span>📋</span>
                <span id="sheetsTabLabel">Tab: —</span>
                <span class="not-cfg" id="sheetsNotCfg">⚠ Sheets not configured</span>
            </div>
            <div class="sp-labels" id="sheetsHeaderRow"></div>
            <div class="sp-values" id="sheetsDataRow"></div>
        </div>

        <!-- ── Image file save location ── -->
        <div class="section-heading">🖼 Image — File That Will Be Saved</div>
        <div style="display:flex; gap:8px; align-items:flex-start;">

            <!-- Small thumbnail -->
            <div style="flex-shrink:0; width:46px;">
                <img id="thumbPreview"
                     style="width:46px; height:69px; object-fit:cover; border-radius:4px;
                            border:1px solid #ccc; background:#ddd; display:none;">
                <div id="thumbMissing"
                     style="width:46px; height:69px; border-radius:4px; border:1px dashed #bbb;
                            background:#f5f5f5; display:flex; align-items:center;
                            justify-content:center; font-size:20px;">🚫</div>
            </div>

            <div class="img-box" style="flex:1; margin:0;">
                <div class="path-lbl">Download path (editable)</div>
                <input type="text" id="imagePathInput" placeholder="Images/movies/filename.jpg">
                <div class="src-url" id="imageSourceUrl"></div>
            </div>
        </div>

        <hr>

        <button class="success" id="saveBtn">✓ Confirm &amp; Save</button>
        <button class="danger"  id="cancelBtn">✕ Cancel — Don't Save Anything</button>

    </div>

    <div class="footer">
        <a href="#" id="settingsLink">⚙ Settings</a>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
